name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Ginescag
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Madrid
          config_display: large
          filename: assets/metrics.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_stars: yes
          plugin_stars_limit: 3
          extras_css: |
            .calendar rect { fill: #1a0000 }
            .calendar rect[data-count="1"] { fill: #660000 }
            .calendar rect[data-count="2"] { fill: #880000 }
            .calendar rect[data-count="3"] { fill: #aa0000 }
            .calendar rect[data-count="4"] { fill: #cc0000 }
            .calendar rect[data-count="5"] { fill: #ff0000 }
            .isocalendar rect { fill: #1a0000 !important }
            .isocalendar rect[data-level="1"] { fill: #660000 !important }
            .isocalendar rect[data-level="2"] { fill: #990000 !important }
            .isocalendar rect[data-level="3"] { fill: #cc0000 !important }
            .isocalendar rect[data-level="4"] { fill: #ff0000 !important }
            h2 { color: #ff4444 !important }
            a { color: #ff4444 !important }
            .octicon { color: #ff4444 !important }
